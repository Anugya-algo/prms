version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# PRMS — Local Development Docker Compose
#
# Services:
#   db  — PostgreSQL 16 with a persistent named volume
#   api — FastAPI backend with hot-reload mount
#
# Usage:
#   docker compose up --build
#   docker compose exec api alembic upgrade head
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: prms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prms_user
      POSTGRES_PASSWORD: prms_password
      POSTGRES_DB: prms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prms_user -d prms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime          # Use the runtime stage (not builder)
    container_name: prms_api
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
    volumes:
      # Mount source code for hot-reload in development.
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the 'db' service hostname.
      DATABASE_URL: postgresql+asyncpg://prms_user:prms_password@db:5432/prms_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: prms_postgres_data
