# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the alembic directory (relative to this file).
script_location = alembic

# sqlalchemy.url is intentionally left blank here.
# It is set programmatically in alembic/env.py from the Settings object
# so that the correct DATABASE_URL is always used regardless of environment.
sqlalchemy.url =

# Template for migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone used when generating migration file names.
timezone = UTC

# Maximum length of the slug portion in the file name.
truncate_slug_length = 40

# Output encoding for migration scripts.
output_encoding = utf-8


[post_write_hooks]
# Uncomment to auto-format generated migration scripts with ruff:
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
